name: Release and Publish to npm

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      new-release-published: ${{ steps.release-info.outputs.new-release-published }}
      new-release-version: ${{ steps.release-info.outputs.new-release-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: semantic-release-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: semantic-release-bot@users.noreply.github.com
        run: npx semantic-release

      - name: Get release info
        id: release-info
        run: |
          # Check if semantic-release created a new version by looking for new tag on current commit
          CURRENT_COMMIT=$(git rev-parse HEAD)

          # Get all tags pointing to current commit
          TAGS=$(git tag --points-at $CURRENT_COMMIT)

          if [ -n "$TAGS" ]; then
            # Found tag(s) on current commit - semantic-release created a release
            LATEST_TAG=$(echo "$TAGS" | head -n1)
            echo "new-release-published=true" >> $GITHUB_OUTPUT
            echo "new-release-version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT
            echo "Released version: $LATEST_TAG"
          else
            echo "new-release-published=false" >> $GITHUB_OUTPUT
            echo "No new release created"
          fi

  publish-npm:
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      new-release-version: ${{ needs.release.outputs.new-release-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new-release-version }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npx --yes npm@latest publish --provenance --access public

  docker-build:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for cosign
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.publish-npm.outputs.new-release-version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        id: repo
        run: echo "lowercase=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.lowercase }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.publish-npm.outputs.new-release-version }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign Docker image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          echo "Signing image with digest: ${{ steps.build-push.outputs.digest }}"
          cosign sign --yes \
            ghcr.io/${{ steps.repo.outputs.lowercase }}@${{ steps.build-push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.repo.outputs.lowercase }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attach sbom --sbom sbom.spdx.json \
            ghcr.io/${{ steps.repo.outputs.lowercase }}@${{ steps.build-push.outputs.digest }}

      - name: Sign SBOM
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.repo.outputs.lowercase }}@${{ steps.build-push.outputs.digest }}.sbom


name: OpenCode - Code Analysis

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Code with OpenCode
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run OpenCode Analysis
        uses: docker://sith:latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_MODEL: github-copilot/claude-sonnet-4.5
          PROJECT_PATH: /github/workspace
          OPENCODE_OUTPUT: /github/workspace/opencode-output
        with:
          args: analyze
      
      - name: Upload Analysis Report
        uses: actions/upload-artifact@v4
        with:
          name: opencode-analysis
          path: opencode-output/
          retention-days: 30
      
      - name: Comment PR with Analysis Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'opencode-output/analysis-report.md';
            
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              // Tronquer si trop long (limite GitHub: 65536 chars)
              const summary = report.length > 60000 ? report.substring(0, 60000) + '\n\n... (truncated)' : report;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 OpenCode Analysis\n\n${summary}\n\n---\n*Powered by OpenCode with GitHub Copilot*`
              });
            }
